name: Build Android APK

on:
  push:
    branches: [ main, master ] # Сработает при пуше в любую из этих веток

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 21

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Prepare Web Assets
        run: |
          # Создаем временную папку для сборки
          mkdir -p www
          # Копируем все ваши файлы (html, js, css, ассеты) в папку www
          cp -r * www/ || true
          # Удаляем саму папку www из копии, чтобы не было рекурсии
          rm -rf www/www

      - name: Initialize Capacitor Project
        run: |
          # Инициализируем проект (com.mygame.app можно заменить на свое)
          npx cap update "MyMobileGame" "com.mygame.app" --web-dir www
          npx cap add android

      - name: Build Android App
        run: |
          npx cap sync android
          cd android && ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Game-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
