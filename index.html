<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BEASBLOX Cyberpunk Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --bg-dark: #050505;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; }

        .cyber-card {
            background: rgba(15, 15, 20, 0.95);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 1.5rem;
            backdrop-filter: blur(15px);
        }

        .neon-border { border: 2px solid var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 243, 255, 0.3); }
        .error-border { border: 2px solid var(--neon-pink); box-shadow: 0 0 15px rgba(255, 0, 255, 0.3); }

        .btn-cyber {
            background: var(--neon-cyan);
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 1rem;
            transition: 0.2s;
        }

        .btn-cyber:active { transform: scale(0.95); }

        .bb-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1rem;
            width: 100%;
            color: white;
            outline: none;
        }

        .bb-input:focus { border-color: var(--neon-cyan); }

        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }

        /* Кнопки действий */
        .action-layer {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
            z-index: 10;
        }

        .mini-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-blur: 5px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
        }

        .mini-btn:active { transform: scale(0.85); }
        .btn-edit { color: var(--neon-cyan); }
        .btn-delete { color: #ff4d4d; }
    </style>
</head>
<body>

    <!-- МОДАЛЬНЫЕ ОКНА -->
    <div id="modal-overlay" class="hidden fixed inset-0 z-[10000] flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm">
        <div id="modal-box" class="cyber-card w-full max-w-xs p-8 text-center fade-in">
            <div id="modal-icon" class="text-5xl mb-4 text-pink-500">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h3 id="modal-title" class="cyber-font text-lg font-black mb-2 uppercase italic tracking-tighter">Внимание</h3>
            <p id="modal-text" class="text-gray-400 text-sm mb-6 leading-relaxed">...</p>
            <button onclick="closeModal()" class="btn-cyber w-full py-4 text-xs tracking-widest">Принять</button>
        </div>
    </div>

    <!-- ЭКРАН ЗАГРУЗКИ / АВТО-ВХОД -->
    <div id="loader-overlay" class="fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center">
        <div class="relative w-20 h-20 mb-6">
            <div class="absolute inset-0 border-4 border-cyan-500/10 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-t-cyan-500 rounded-full animate-spin"></div>
        </div>
        <div id="loader-status" class="cyber-font text-cyan-400 text-xs font-bold uppercase tracking-[0.4em] animate-pulse">Синхронизация нейросети...</div>
    </div>

    <!-- АВТОРИЗАЦИЯ -->
    <div id="view-auth" class="hidden min-h-screen flex flex-col items-center justify-center px-10 bg-black">
        <div class="w-24 h-24 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-3xl flex items-center justify-center shadow-[0_0_30px_rgba(6,182,212,0.5)] mb-8">
            <i class="fas fa-user-shield text-white text-4xl"></i>
        </div>
        <h1 class="cyber-font text-4xl font-black italic mb-2">BEASBLOX</h1>
        <p class="text-cyan-500/50 text-[9px] uppercase tracking-[0.5em] mb-12">Вход в систему</p>
        
        <form id="auth-form" class="w-full max-w-xs space-y-4">
            <input type="email" id="email" placeholder="Email" class="bb-input border-cyan-500/30" required>
            <input type="password" id="pass" placeholder="Пароль" class="bb-input" required>
            <button type="submit" id="auth-btn" class="btn-cyber w-full py-5 text-sm shadow-lg shadow-cyan-500/20">Войти</button>
        </form>
        <button id="toggle-auth" class="mt-8 text-cyan-400 text-[10px] font-bold uppercase tracking-widest">Нет аккаунта? Зарегистрироваться</button>
    </div>

    <!-- ГЛАВНАЯ -->
    <div id="view-home" class="hidden h-screen flex flex-col">
        <nav class="p-6 flex justify-between items-center border-b border-white/5">
            <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center text-white shadow-[0_0_15px_rgba(6,182,212,0.4)]"><i class="fas fa-cube"></i></div>
            <div class="flex gap-3">
                <button onclick="openCreateMode()" class="bg-white text-black px-6 py-2.5 rounded-xl font-black text-xs uppercase shadow-lg active:scale-95">Создать</button>
                <button onclick="signOutUser()" class="w-10 h-10 bg-white/5 rounded-xl text-white flex items-center justify-center"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </nav>

        <div class="flex-1 overflow-y-auto custom-scroll p-6">
            <div class="cyber-card p-8 mb-8 relative overflow-hidden neon-border">
                <h2 class="cyber-font text-4xl font-black italic leading-none mb-3 text-white">BEASBLOX<br>NETWORK</h2>
                <div class="flex items-center gap-2">
                    <span class="bg-red-500 text-[8px] font-black px-2 py-1 rounded uppercase">Статус: В сети</span>
                    <span id="user-display" class="text-gray-400 text-[9px] truncate">...</span>
                </div>
            </div>

            <div id="games-list" class="grid grid-cols-2 gap-4 pb-20">
                <!-- Сюда придут игры -->
            </div>
        </div>
    </div>

    <!-- РЕДАКТОР / СОЗДАНИЕ -->
    <div id="view-editor" class="hidden h-screen flex flex-col p-6 bg-[#080808]">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="showView('home')" class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center"><i class="fas fa-arrow-left"></i></button>
            <h2 id="editor-title" class="cyber-font text-xl font-black italic text-cyan-400 uppercase">NEW_PROJECT</h2>
        </div>
        <form id="editor-form" class="flex-1 flex flex-col space-y-4">
            <input type="hidden" id="edit-id">
            <div class="flex gap-3">
                <input type="text" id="g-emoji" placeholder="🚀" class="bb-input w-20 text-center text-2xl" required>
                <input type="text" id="g-title" placeholder="Название игры" class="bb-input flex-1" required>
            </div>
            <textarea id="g-html" placeholder="<html>... Вставьте ваш код игры здесь" class="flex-1 bb-input font-mono text-[11px] resize-none leading-relaxed" required></textarea>
            <button type="submit" id="submit-btn" class="btn-cyber w-full py-5 text-sm">Опубликовать в сеть</button>
        </form>
    </div>

    <!-- ПЛЕЕР -->
    <div id="view-player" class="hidden fixed inset-0 z-[5000] bg-black">
        <div class="absolute top-6 left-6 z-[5001] flex gap-2">
            <button onclick="showView('home')" class="bg-black/60 backdrop-blur-md border border-white/10 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">Выйти из игры</button>
        </div>
        <iframe id="game-frame" class="w-full h-full border-none"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCDY-KewgGcj0-gHHozb0XfwFwjfLINHQw",
            authDomain: "beasblox.firebaseapp.com",
            projectId: "beasblox",
            storageBucket: "beasblox.firebasestorage.app",
            messagingSenderId: "350390528463",
            appId: "1:350390528463:web:daf6e690f4f163ad2ecaba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = 'beasblox-global-v1';

        let isLoginMode = true;
        let cachedGames = [];

        // ВКЛЮЧАЕМ АВТО-ВХОД (Запоминание сессии)
        setPersistence(auth, browserLocalPersistence);

        // --- НАВИГАЦИЯ ---
        window.showView = (id) => {
            ['auth', 'home', 'editor', 'player'].forEach(v => {
                document.getElementById('view-' + v).classList.add('hidden');
            });
            document.getElementById('view-' + id).classList.remove('hidden');
        };

        window.openModal = (title, text, isError = true) => {
            const box = document.getElementById('modal-box');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            box.className = isError ? "cyber-card w-full max-w-xs p-8 text-center fade-in error-border" : "cyber-card w-full max-w-xs p-8 text-center fade-in neon-border";
            document.getElementById('modal-overlay').classList.remove('hidden');
        };
        window.closeModal = () => document.getElementById('modal-overlay').classList.add('hidden');

        // --- AUTH ---
        onAuthStateChanged(auth, (user) => {
            document.getElementById('loader-overlay').classList.add('hidden');
            if (user) {
                document.getElementById('user-display').innerText = user.email;
                showView('home');
                listenToGames();
            } else {
                showView('auth');
            }
        });

        document.getElementById('toggle-auth').onclick = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-btn').innerText = isLoginMode ? "Войти" : "Создать протокол";
            document.getElementById('toggle-auth').innerText = isLoginMode ? "Нет аккаунта? Зарегистрироваться" : "Есть аккаунт? Войти";
        };

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                if(isLoginMode) await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
            } catch (err) { openModal("ОШИБКА ДОСТУПА", "Данные нейросети не совпадают с базой."); }
        };

        window.signOutUser = () => signOut(auth);

        // --- GAME LOGIC ---
        function listenToGames() {
            const ref = collection(db, 'artifacts', APP_ID, 'public', 'data', 'games');
            onSnapshot(ref, (snap) => {
                const list = document.getElementById('games-list');
                list.innerHTML = '';
                cachedGames = [];
                snap.forEach(d => {
                    const g = { id: d.id, ...d.data() };
                    cachedGames.push(g);
                    
                    const isOwner = auth.currentUser && g.authorId === auth.currentUser.uid;
                    
                    const card = document.createElement('div');
                    card.className = "cyber-card p-5 relative flex flex-col items-center justify-center cursor-pointer min-h-[140px] group transition-all active:scale-95";
                    card.innerHTML = `
                        ${isOwner ? `
                        <div class="action-layer">
                            <button onclick="event.stopPropagation(); startEdit('${g.id}')" class="mini-btn btn-edit"><i class="fas fa-pen"></i></button>
                            <button onclick="event.stopPropagation(); confirmDelete('${g.id}')" class="mini-btn btn-delete"><i class="fas fa-trash"></i></button>
                        </div>
                        ` : ''}
                        <div onclick="playGame('${g.id}')" class="flex flex-col items-center w-full">
                            <div class="text-4xl mb-3 drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]">${g.emoji}</div>
                            <div class="cyber-font text-[9px] uppercase font-black text-center tracking-tighter truncate w-full px-2">${g.title}</div>
                            <div class="text-[7px] text-cyan-500/50 mt-1 uppercase font-bold tracking-widest">${isOwner ? 'МОЙ ПРОЕКТ' : 'ОТ ПОЛЬЗОВАТЕЛЯ'}</div>
                        </div>
                    `;
                    list.appendChild(card);
                });
            });
        }

        window.playGame = (id) => {
            const g = cachedGames.find(x => x.id === id);
            if(!g) return;
            const frame = document.getElementById('game-frame');
            frame.srcdoc = `
                <!DOCTYPE html><html><head>
                <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
                <style>body{margin:0;overflow:hidden;background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;}</style>
                </head><body>${g.html}</body></html>
            `;
            showView('player');
        };

        // --- РЕДАКТИРОВАНИЕ / УДАЛЕНИЕ ---
        window.openCreateMode = () => {
            document.getElementById('edit-id').value = '';
            document.getElementById('editor-form').reset();
            document.getElementById('editor-title').innerText = "NEW_PROJECT";
            document.getElementById('submit-btn').innerText = "Опубликовать в сеть";
            showView('editor');
        };

        window.startEdit = (id) => {
            const g = cachedGames.find(x => x.id === id);
            if(!g) return;
            document.getElementById('edit-id').value = g.id;
            document.getElementById('g-emoji').value = g.emoji;
            document.getElementById('g-title').value = g.title;
            document.getElementById('g-html').value = g.html;
            document.getElementById('editor-title').innerText = "UPDATE_PROJECT";
            document.getElementById('submit-btn').innerText = "Обновить протокол";
            showView('editor');
        };

        window.confirmDelete = async (id) => {
            if(!confirm("ВНИМАНИЕ: Удалить этот проект из сети навсегда?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'games', id));
                openModal("СИСТЕМА", "Проект успешно стерт из памяти.", false);
            } catch (e) { openModal("ОШИБКА", "Не удалось удалить данные."); }
        };

        // --- СОХРАНЕНИЕ ---
        document.getElementById('editor-form').onsubmit = async (e) => {
            e.preventDefault();
            const loader = document.getElementById('loader-overlay');
            const status = document.getElementById('loader-status');
            const editId = document.getElementById('edit-id').value;

            loader.classList.remove('hidden');
            status.innerText = "Шифрование данных...";

            try {
                const gameId = editId || 'game_' + Date.now();
                const data = {
                    title: document.getElementById('g-title').value,
                    emoji: document.getElementById('g-emoji').value,
                    html: document.getElementById('g-html').value,
                    authorId: auth.currentUser.uid,
                    authorEmail: auth.currentUser.email,
                    updatedAt: serverTimestamp()
                };
                if(!editId) data.createdAt = serverTimestamp();

                await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'games', gameId), data, { merge: true });

                setTimeout(() => {
                    loader.classList.add('hidden');
                    showView('home');
                    openModal("СИСТЕМА", editId ? "Протокол обновлен." : "Протокол успешно опубликован.", false);
                }, 1000);

            } catch (err) {
                loader.classList.add('hidden');
                openModal("СЕТЕВАЯ ОШИБКА", err.message);
            }
        };

    </script>
</body>
</html>
