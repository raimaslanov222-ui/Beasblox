<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAI-ROBLOX CLOUD PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --rbx-blue: #00a2ff; --rbx-bg: #0e0e11; --rbx-card: #1c1d22; --admin-gold: #ffb800; --danger: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--rbx-bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden; }

        /* HEADER */
        header { height: 70px; background: #18191d; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #25262d; }
        .content { flex: 1; overflow-y: auto; padding: 20px; height: calc(100vh - 70px); }
        
        /* GRID */
        .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .game-item { background: var(--rbx-card); border-radius: 12px; overflow: hidden; border: 1px solid #25262d; position: relative; }
        .game-img { height: 110px; background: #25262d; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .game-name { padding: 10px; text-align: center; font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ОКНО ПРЕВЬЮ (PREVIEW SHEET) */
        #preview-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; height: 65%; background: #18191d; z-index: 15000; border-top-left-radius: 25px; border-top-right-radius: 25px; transition: bottom 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); display: flex; flex-direction: column; }
        #preview-sheet.active { bottom: 0; }
        .sheet-banner { height: 150px; background: #25262d; display: flex; align-items: center; justify-content: center; font-size: 70px; border-top-left-radius: 25px; border-top-right-radius: 25px; position: relative; }
        .close-sheet { position: absolute; top: 15px; right: 15px; color: #fff; font-size: 20px; font-weight: bold; width: 30px; height: 30px; background: rgba(0,0,0,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 14000; }

        /* ADMIN PANEL */
        #admin-panel { display: none; position: fixed; inset: 0; background: #0b0b0d; z-index: 20000; padding: 20px; overflow-y: auto; }
        .adm-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #1c1d22; border: 1px solid #333; color: #fff; border-radius: 8px; font-size: 14px; }
        .btn-main { width: 100%; padding: 18px; background: var(--rbx-blue); border: none; color: #fff; font-weight: 900; border-radius: 12px; margin-top: 10px; }
        
        /* PLAYER */
        #player-layer { display: none; position: fixed; inset: 0; background: #000; z-index: 30000; }
        iframe { width: 100%; height: 100%; border: none; }
        .exit-btn { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px; z-index: 30001; border: none; }

        /* TOAST */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100000; width: 90%; }
        .toast { background: #222; border-left: 4px solid var(--rbx-blue); padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="main-hub">
        <header>
            <div style="font-weight:900; font-size:20px;">ROBLOX <span style="color:var(--rbx-blue)">CLOUD</span></div>
            <div onclick="openAdmin()" style="color:var(--admin-gold); font-weight:900; border:1px solid var(--admin-gold); padding:5px 10px; border-radius:5px; font-size:11px;">STUDIO</div>
        </header>
        <div class="content">
            <div id="games-list" class="games-grid"></div>
        </div>
    </div>

    <div id="overlay" onclick="closePreview()"></div>

    <div id="preview-sheet">
        <div class="sheet-banner">
            <span id="p-emoji">🎮</span>
            <div class="close-sheet" onclick="closePreview()">✕</div>
        </div>
        <div style="padding:20px; text-align:center; flex:1;">
            <div id="p-title" style="font-size:22px; font-weight:900;">Название Игры</div>
            <div id="p-desc" style="color:#aaa; margin-top:8px; font-size:14px; line-height:1.4;">Нет описания.</div>
        </div>
        <div style="padding:20px;">
            <button id="p-play-btn" class="btn-main">ИГРАТЬ</button>
        </div>
    </div>

    <div id="admin-panel">
        <h2 id="adm-title" style="color:var(--admin-gold)">CREATOR STUDIO</h2>
        <input type="text" id="g-name" class="adm-input" placeholder="Название игры">
        <input type="text" id="g-emoji" class="adm-input" placeholder="Emoji (например 🔥)">
        <textarea id="g-desc" class="adm-input" style="height:70px;" placeholder="Описание игры..."></textarea>
        
        <div style="background:#1c1d22; padding:15px; border-radius:10px; border:1px dashed #444; text-align:center;">
            <p style="font-size:11px; color:#888; margin-top:0;">Добавляй файлы по одному (index.html, data.js и др.)</p>
            <input type="file" id="file-selector" style="display:none;">
            <button onclick="document.getElementById('file-selector').click()" style="background:#444; color:#fff; border:none; padding:10px; border-radius:5px; width:100%;">+ ДОБАВИТЬ ФАЙЛ</button>
            <div id="file-list" style="font-size:10px; color:var(--rbx-blue); margin-top:10px; text-align: left;"></div>
        </div>

        <button id="publish-btn" class="btn-main" onclick="publishGame()">ОПУБЛИКОВАТЬ</button>
        
        <div id="manage-list" style="margin-top:20px; border-top:1px solid #333; padding-top:10px;"></div>
        <button onclick="closeAdmin()" style="width:100%; margin-top:15px; padding:12px; background:#333; color:#fff; border:none; border-radius:8px;">ЗАКРЫТЬ</button>
    </div>

    <div id="player-layer">
        <button class="exit-btn" onclick="stopGame()">✕ ВЫЙТИ</button>
        <iframe id="game-frame"></iframe>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // Твои данные Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCFJQ4OKKStxVW7gUj1lS4KHwxGc1_QIwg",
            authDomain: "mymobilegame-b5e68.firebaseapp.com",
            projectId: "mymobilegame-b5e68",
            storageBucket: "mymobilegame-b5e68.appspot.com",
            appId: "1:137334852741:web:7f1be97afce766c011edec"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let library = [], editingID = null;
        let selectedFilesData = { html: "", css: "", js: "", fileNames: [] };

        window.onload = loadGames;

        function notify(msg) {
            const t = document.createElement('div'); t.className='toast'; t.innerText=msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        async function loadGames() {
            try {
                const snap = await db.collection('shared_games').get();
                library = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderMainGrid();
            } catch(e) { notify("Ошибка облака!"); }
        }

        // Отрисовка главной сетки игр
        function renderMainGrid() {
            document.getElementById('games-list').innerHTML = library.map((g, i) => `
                <div class="game-item" onclick="openPreview(${i})">
                    <div class="game-img">${g.emoji || '🎮'}</div>
                    <div class="game-name">${g.name}</div>
                </div>`).join('');
            
            // Отрисовка списка в админке
            document.getElementById('manage-list').innerHTML = '<p style="font-size:12px; color:#666;">Твои проекты:</p>' + library.map(g => `
                <div style="display:flex; justify-content:space-between; align-items:center; background:#1c1d22; padding:10px; border-radius:8px; margin-top:8px; border:1px solid #333;">
                    <span onclick="editMode('${g.id}')" style="font-size:13px; flex:1; color:var(--admin-gold);">${g.name}</span>
                    <button onclick="deleteGame('${g.id}')" style="background:var(--danger); border:none; color:#fff; font-size:10px; padding:6px 10px; border-radius:4px;">DEL</button>
                </div>`).join('');
        }

        // ЛОГИКА ОКНА ПРЕВЬЮ
        function openPreview(index) {
            const game = library[index];
            document.getElementById('p-emoji').innerText = game.emoji || '🎮';
            document.getElementById('p-title').innerText = game.name;
            document.getElementById('p-desc').innerText = game.desc || "Описание игры не добавлено разработчиком.";
            
            // Привязываем функцию запуска к кнопке ИГРАТЬ
            document.getElementById('p-play-btn').onclick = () => run(index);
            
            // Показываем окно
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('preview-sheet').classList.add('active');
        }

        function closePreview() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('preview-sheet').classList.remove('active');
        }

        // Запуск игры
        function run(i) {
            closePreview(); // Закрываем превью перед запуском
            document.getElementById('game-frame').srcdoc = library[i].code;
            document.getElementById('player-layer').style.display = 'block';
        }

        // Логика выбора файлов (улучшенная)
        document.getElementById('file-selector').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            for (let f of files) {
                if (selectedFilesData.fileNames.includes(f.name)) continue;
                const text = await f.text();
                selectedFilesData.fileNames.push(f.name);
                
                if (f.name.endsWith('.html')) {
                    // Очищаем HTML от старых путей к скриптам/стилям
                    selectedFilesData.html = text.replace(/<script\b[^>]*src=["']([^"']+)["'][^>]*><\/script>/gi, '')
                                                 .replace(/<link\b[^>]*href=["']([^"']+)["'][^>]*>/gi, '');
                } else if (f.name.endsWith('.css')) {
                    selectedFilesData.css += `\n/* ${f.name} */\n${text}\n`;
                } else if (f.name.endsWith('.js')) {
                    selectedFilesData.js += `\n// --- ${f.name} ---\n${text}\n`;
                }
            }
            document.getElementById('file-list').innerHTML = selectedFilesData.fileNames.map(n => `<div>• ${n}</div>`).join('');
            notify("Файл принят!");
        });

        // Функция публикации (склейка файлов)
        async function publishGame() {
            const n = document.getElementById('g-name').value, 
                  e = document.getElementById('g-emoji').value, 
                  d = document.getElementById('g-desc').value;

            // Собираем монолит
            let finalCode = "";
            if (selectedFilesData.html) {
                finalCode = selectedFilesData.html;
                if (selectedFilesData.css) finalCode = `<style>${selectedFilesData.css}</style>\n` + finalCode;
                if (selectedFilesData.js) finalCode = finalCode + `\n<script>${selectedFilesData.js}<\/script>`;
            } else if (editingID) {
                finalCode = library.find(x => x.id === editingID).code;
            }

            if(!n || !finalCode) return notify("Заполни имя и выбери файлы!");

            const data = { name: n, emoji: e, desc: d, code: finalCode };

            try {
                if (editingID) {
                    await db.collection('shared_games').doc(editingID).update(data);
                    notify("Обновлено! ✅");
                } else {
                    await db.collection('shared_games').add(data);
                    notify("Опубликовано! 🚀");
                }
                resetForm(); loadGames(); closeAdmin();
            } catch(err) { notify("Ошибка базы!"); }
        }

        function editMode(id) {
            const g = library.find(x => x.id === id);
            editingID = id;
            document.getElementById('g-name').value = g.name;
            document.getElementById('g-emoji').value = g.emoji;
            document.getElementById('g-desc').value = g.desc;
            document.getElementById('adm-title').innerText = "РЕДАКТИРОВАНИЕ";
            document.getElementById('publish-btn').innerText = "СОХРАНИТЬ";
            document.getElementById('file-list').innerHTML = "<div style='color:orange'>Файлы уже загружены. Выбери новые, чтобы заменить код.</div>";
            document.getElementById('admin-panel').scrollTo(0,0);
        }

        async function deleteGame(id) {
            if(confirm("Удалить проект навсегда?")) {
                await db.collection('shared_games').doc(id).delete();
                notify("🗑️ Удалено");
                loadGames();
            }
        }

        function resetForm() {
            editingID = null;
            document.getElementById('g-name').value = "";
            document.getElementById('g-emoji').value = "";
            document.getElementById('g-desc').value = "";
            document.getElementById('file-list').innerHTML = "";
            selectedFilesData = { html: "", css: "", js: "", fileNames: [] };
            document.getElementById('adm-title').innerText = "CREATOR STUDIO";
            document.getElementById('publish-btn').innerText = "ОПУБЛИКОВАТЬ";
        }

        function stopGame() { document.getElementById('player-layer').style.display = 'none'; document.getElementById('game-frame').srcdoc = ''; }
        function openAdmin() { document.getElementById('admin-panel').style.display = 'block'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; resetForm(); }
    </script>
</body>
</html>
