<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GameHub Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">GameHub</div>
        <div class="nav-controls">
            <span id="user-info">ЗАГРУЗКА...</span>
            <button id="admin-open-btn" class="glass-icon-btn" style="display:none;" onclick="window.openAdminConsole()">
                🛠️ АДМИН
            </button>
            <button id="auth-btn" class="glass-icon-btn" onclick="window.toggleAuthSession()">
                👤 ВОЙТИ
            </button>
        </div>
    </header>

    <main>
        <div id="game-container" class="game-grid">
            </div>
    </main>

    <div id="auth-modal" class="modal">
        <div class="glass-card">
            <span class="close-x" onclick="window.closeActiveModals()">×</span>
            <h2 style="margin-bottom: 20px;">Авторизация</h2>
            
            <div class="input-group">
                <input type="email" id="auth-email" placeholder="Ваш Email" autocomplete="email">
                <input type="password" id="auth-pass" placeholder="Пароль" autocomplete="current-password">
            </div>

            <div class="btn-group" style="margin-top: 20px;">
                <button id="login-btn" class="glass-btn action" onclick="window.executeUserLogin()">
                    ВОЙТИ В АККАУНТ
                </button>
                <button id="register-btn" class="glass-btn secondary" onclick="window.executeUserRegistration()">
                    СОЗДАТЬ АККАУНТ
                </button>
            </div>
            
            <p style="font-size: 12px; color: var(--text-dim); margin-top: 15px;">
                Доступ к облачным сохранениям и играм
            </p>
        </div>
    </div>

    <div id="game-details-modal" class="modal">
        <div class="glass-card">
            <span class="close-x" onclick="window.closeActiveModals()">×</span>
            <h2 id="details-title" style="color: var(--neon);">Название игры</h2>
            <div style="margin: 20px 0; min-height: 80px;">
                <p id="details-desc" style="color: var(--text-dim); line-height: 1.5;"></p>
            </div>
            <button id="start-game-btn" class="glass-btn action" onclick="window.launchGameEngine()">
                ИГРАТЬ СЕЙЧАС
            </button>
        </div>
    </div>

    <div id="admin-panel" class="modal">
        <div class="glass-card" style="max-width: 500px;">
            <span class="close-x" onclick="window.closeActiveModals()">×</span>
            <h2>Загрузить проект</h2>
            
            <input type="text" id="game-title" placeholder="Название игры (например: Clicker)">
            <input type="text" id="game-emoji" placeholder="Эмодзи (например: 🚀)">
            <textarea id="game-desc-input" placeholder="Описание игры..." rows="3" style="width:100%; margin-bottom:10px;"></textarea>
            
            <div style="text-align: left; margin-bottom: 5px; font-size: 12px; color: var(--neon);">КОД ИГРЫ (HTML/JS):</div>
            <textarea id="game-code" placeholder="<html>...</html>" rows="8" style="font-family: monospace;"></textarea>
            
            <button id="save-game" class="glass-btn action" onclick="window.processGameUpload()">
                ОПУБЛИКОВАТЬ В ОБЛАКО
            </button>
        </div>
    </div>

    <div id="top-loader" class="glass-toast">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="mini-spinner"></div>
            <span id="loader-text">Синхронизация...</span>
        </div>
    </div>

    <script type="module" src="main.js"></script>

    <script>
        // Скрипт для предотвращения случайных свайпов и фикса багов мобильной верстки
        document.addEventListener('contextmenu', event => event.preventDefault()); // Отключаем ПКМ

        // Плавное появление элементов при загрузке
        window.addEventListener('load', () => {
            document.body.style.opacity = '1';
            console.log("Index UI Initialized");
        });

        // Фикс высоты для мобильных браузеров (100vh bug)
        const resetHeight = () => {
            document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
        };
        window.addEventListener('resize', resetHeight);
        resetHeight();
    </script>

</body>
</html>
