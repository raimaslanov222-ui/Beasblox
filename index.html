 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BEASBLOX Cyber Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --bg-dark: #08080c;
            --card-bg: rgba(15, 15, 25, 0.95);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            color: #e0e0e0;
            margin: 0;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 243, 255, 0.05) 0%, transparent 70%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; }

        .cyber-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 1rem;
            backdrop-filter: blur(10px);
        }

        .neon-text {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .btn-cyber {
            background: linear-gradient(45deg, var(--neon-cyan), #00a8ff);
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 0.5rem;
            transition: 0.2s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            padding: 0.75rem 1.5rem;
            cursor: pointer;
        }

        .btn-cyber:active { transform: scale(0.95); }

        .btn-outline {
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            background: transparent;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .bb-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 0.5rem;
            padding: 1rem;
            width: 100%;
            color: white;
            outline: none;
        }

        .modal-enter { animation: modalIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .logo-hex {
            width: 36px;
            height: 36px;
            background: var(--neon-cyan);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .logo-hex i { color: #000; font-size: 18px; }

        .game-card {
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s;
        }

        .action-layer {
            position: absolute;
            top: 5px;
            right: 5px;
            display: flex;
            gap: 5px;
        }

        .mini-btn {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .btn-edit { color: var(--neon-cyan); }
        .btn-delete { color: #ff4d4d; }

        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--neon-cyan); }
    </style>
</head>
<body>

    <!-- UI MODAL SYSTEM -->
    <div id="ui-modal" class="hidden fixed inset-0 z-[10000] flex items-center justify-center p-6 bg-black/90 backdrop-blur-md">
        <div id="ui-modal-box" class="cyber-card w-full max-w-sm p-8 text-center modal-enter relative overflow-hidden">
            <div id="ui-modal-glow" class="absolute top-0 left-0 w-full h-1 bg-cyan-500 shadow-[0_0_15px_#00f3ff]"></div>
            <div id="ui-modal-icon" class="text-5xl mb-4 text-cyan-400"><i class="fas fa-shield-alt"></i></div>
            <h3 id="ui-modal-title" class="cyber-font text-lg font-black mb-2 uppercase italic">SYSTEM_MESSAGE</h3>
            <p id="ui-modal-text" class="text-gray-400 text-sm mb-8 leading-relaxed">...</p>
            <div id="ui-modal-actions" class="flex flex-col gap-3">
                <button id="ui-modal-confirm" class="btn-cyber w-full">ACCEPT</button>
                <button id="ui-modal-cancel" onclick="closeUIModal()" class="btn-outline py-3 text-xs font-bold uppercase tracking-widest">CANCEL</button>
            </div>
        </div>
    </div>

    <!-- LOADER -->
    <div id="loader-overlay" class="fixed inset-0 z-[9999] bg-[#050508] flex flex-col items-center justify-center">
        <div class="logo-hex w-16 h-16 mb-6 animate-spin" style="animation-duration: 3s">
            <i class="fas fa-sync-alt"></i>
        </div>
        <div class="cyber-font text-cyan-400 text-[10px] font-bold uppercase tracking-[0.5em] animate-pulse">ACODE_BOOTING...</div>
    </div>

    <!-- AUTH VIEW -->
    <div id="view-auth" class="hidden min-h-screen flex flex-col items-center justify-center px-10">
        <div class="logo-hex w-20 h-20 mb-8">
            <i class="fas fa-lock text-3xl"></i>
        </div>
        <h1 class="cyber-font text-3xl font-black italic mb-2 tracking-tighter neon-text text-center">BEASBLOX</h1>
        <p class="text-white/20 text-[8px] uppercase tracking-[0.6em] mb-12">Mobile Admin Link</p>
        
        <form id="auth-form" class="w-full max-w-xs space-y-4">
            <input type="email" id="email" placeholder="EMAIL_ID" class="bb-input" required>
            <input type="password" id="pass" placeholder="SECRET_KEY" class="bb-input" required>
            <button type="submit" id="auth-btn" class="btn-cyber w-full py-4 text-xs tracking-widest">INITIATE_AUTH</button>
        </form>
        <button id="toggle-auth" class="mt-8 text-white/30 text-[9px] font-bold uppercase">Registration</button>
    </div>

    <!-- HOME VIEW -->
    <div id="view-home" class="hidden h-screen flex flex-col">
        <nav class="p-4 flex justify-between items-center border-b border-cyan-500/10 bg-black/60 backdrop-blur-lg">
            <div class="flex items-center gap-3">
                <div class="logo-hex"><i class="fas fa-terminal"></i></div>
                <div class="cyber-font text-lg font-black italic neon-text tracking-tighter">BEASBLOX</div>
            </div>
            <div class="flex gap-2">
                <button id="nav-btn-create" onclick="openCreateMode()" class="hidden btn-cyber px-4 py-2 text-[9px] shadow-lg">CREATE</button>
                <button onclick="signOutUser()" class="w-9 h-9 bg-white/5 rounded-lg text-white flex items-center justify-center border border-white/10"><i class="fas fa-power-off"></i></button>
            </div>
        </nav>

        <div class="flex-1 overflow-y-auto custom-scroll p-4 pb-20">
            <div id="admin-banner" class="hidden cyber-card p-5 mb-6 border-pink-500/40 bg-gradient-to-r from-pink-500/10 to-transparent">
                <h2 class="cyber-font text-[10px] font-black text-pink-500 mb-1 uppercase tracking-widest">Admin Access: raimaslanov222</h2>
                <p class="text-[9px] text-gray-500 font-bold uppercase">Network Control Active</p>
            </div>
            <div id="games-list" class="grid grid-cols-2 gap-3"></div>
        </div>
    </div>

    <!-- EDITOR VIEW -->
    <div id="view-editor" class="hidden h-screen flex flex-col p-4">
        <div class="flex items-center gap-3 mb-4">
            <button onclick="showView('home')" class="w-10 h-10 bg-white/5 rounded-lg flex items-center justify-center"><i class="fas fa-times"></i></button>
            <h2 id="editor-title" class="cyber-font text-sm font-black italic neon-text">MODULE_INIT</h2>
        </div>
        <form id="editor-form" class="flex-1 flex flex-col space-y-3">
            <input type="hidden" id="edit-id">
            <div class="flex gap-2">
                <input type="text" id="g-emoji" placeholder="🚀" class="bb-input w-16 text-center text-2xl" required>
                <input type="text" id="g-title" placeholder="PROJECT_NAME" class="bb-input flex-1 font-bold text-xs" required>
            </div>
            <textarea id="g-html" placeholder="<!-- PASTE HTML/JS CODE HERE -->" class="flex-1 bb-input font-mono text-[10px] resize-none border-cyan-500/10" required spellcheck="false"></textarea>
            <button type="submit" id="submit-btn" class="btn-cyber w-full py-4 text-xs">DEPLOY_TO_CLOUD</button>
        </form>
    </div>

    <!-- PLAYER VIEW -->
    <div id="view-player" class="hidden fixed inset-0 z-[5000] bg-black">
        <button onclick="showView('home')" class="absolute top-4 left-4 z-[5001] bg-black/80 border border-cyan-500/30 px-5 py-2 rounded-lg text-[9px] font-black uppercase text-cyan-400">EXIT_SESSION</button>
        <iframe id="game-frame" class="w-full h-full border-none" sandbox="allow-scripts allow-forms allow-pointer-lock allow-same-origin"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCDY-KewgGcj0-gHHozb0XfwFwjfLINHQw",
            authDomain: "beasblox.firebaseapp.com",
            projectId: "beasblox",
            storageBucket: "beasblox.firebasestorage.app",
            messagingSenderId: "350390528463",
            appId: "1:350390528463:web:daf6e690f4f163ad2ecaba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const APP_ID = 'beasblox-global-v1'; 
        const ADMIN_EMAIL = 'raimaslanov222@gmail.com';

        let isLoginMode = true;
        let cachedGames = [];

        window.openUIModal = (title, text, confirmLabel, onConfirm, isDanger = false) => {
            const modal = document.getElementById('ui-modal');
            const titleEl = document.getElementById('ui-modal-title');
            const textEl = document.getElementById('ui-modal-text');
            const confirmBtn = document.getElementById('ui-modal-confirm');
            const glow = document.getElementById('ui-modal-glow');
            const icon = document.getElementById('ui-modal-icon');

            titleEl.innerText = title;
            textEl.innerText = text;
            confirmBtn.innerText = confirmLabel;
            
            if (isDanger) {
                glow.className = "absolute top-0 left-0 w-full h-1 bg-pink-500 shadow-[0_0_15px_#ff00ff]";
                icon.className = "text-5xl mb-4 text-pink-500";
                confirmBtn.className = "btn-cyber w-full !from-pink-600 !to-red-600";
            } else {
                glow.className = "absolute top-0 left-0 w-full h-1 bg-cyan-500 shadow-[0_0_15px_#00f3ff]";
                icon.className = "text-5xl mb-4 text-cyan-400";
                confirmBtn.className = "btn-cyber w-full";
            }

            confirmBtn.onclick = () => { onConfirm(); closeUIModal(); };
            modal.classList.remove('hidden');
        };

        window.closeUIModal = () => document.getElementById('ui-modal').classList.add('hidden');

        try {
            setPersistence(auth, browserLocalPersistence);
        } catch(e) { console.warn("Persistence not available"); }

        window.showView = (id) => {
            ['auth', 'home', 'editor', 'player'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+id).classList.remove('hidden');
        };

        onAuthStateChanged(auth, (user) => {
            document.getElementById('loader-overlay').classList.add('hidden');
            if (user) {
                const isAdmin = user.email === ADMIN_EMAIL;
                document.getElementById('nav-btn-create').classList.toggle('hidden', !isAdmin);
                document.getElementById('admin-banner').classList.toggle('hidden', !isAdmin);
                showView('home');
                listenToGames(isAdmin);
            } else {
                showView('auth');
            }
        });

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                if(isLoginMode) await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
            } catch (err) { 
                openUIModal("ERROR", "Access denied. Check credentials.", "RETRY", closeUIModal, true);
            }
        };

        document.getElementById('toggle-auth').onclick = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-btn').innerText = isLoginMode ? "INITIATE_AUTH" : "REGISTER_NODE";
            document.getElementById('toggle-auth').innerText = isLoginMode ? "Registration" : "Back to login";
        };

        window.signOutUser = () => signOut(auth);

        function listenToGames(isAdmin) {
            const ref = collection(db, 'artifacts', APP_ID, 'public', 'data', 'games');
            onSnapshot(ref, (snap) => {
                const list = document.getElementById('games-list');
                list.innerHTML = '';
                cachedGames = [];
                snap.forEach(d => {
                    const g = { id: d.id, ...d.data() };
                    cachedGames.push(g);
                    
                    const isOwner = auth.currentUser && g.authorId === auth.currentUser.uid;
                    const canControl = isAdmin || isOwner;

                    const card = document.createElement('div');
                    card.className = `cyber-card game-card p-4 relative flex flex-col items-center justify-center active:scale-95 transition-all`;
                    card.innerHTML = `
                        ${canControl ? `
                        <div class="action-layer">
                            <button onclick="event.stopPropagation(); startEdit('${g.id}')" class="mini-btn btn-edit"><i class="fas fa-pen"></i></button>
                            <button onclick="event.stopPropagation(); askDelete('${g.id}')" class="mini-btn btn-delete"><i class="fas fa-trash-alt"></i></button>
                        </div>
                        ` : ''}
                        <div onclick="playGame('${g.id}')" class="flex flex-col items-center w-full">
                            <div class="text-4xl mb-2 drop-shadow-lg">${g.emoji || '👾'}</div>
                            <div class="cyber-font text-[9px] uppercase font-bold text-center truncate w-full px-1 tracking-widest text-white/80">${g.title}</div>
                        </div>
                    `;
                    list.appendChild(card);
                });
            });
        }

        window.playGame = (id) => {
            const g = cachedGames.find(x => x.id === id);
            // ФИКС ДЛЯ ЗМЕЙКИ И ДРУГИХ ИГР: Авто-добавление необходимых мета-тегов и стилей
            const wrapper = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
                    <style>
                        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; }
                        canvas { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 20px rgba(0,243,255,0.2); }
                    </style>
                </head>
                <body onclick="this.focus()">
                    ${g.html}
                </body>
                </html>
            `;
            document.getElementById('game-frame').srcdoc = wrapper;
            showView('player');
        };

        window.openCreateMode = () => {
            document.getElementById('edit-id').value = '';
            document.getElementById('editor-form').reset();
            document.getElementById('editor-title').innerText = "MODULE_INIT";
            document.getElementById('submit-btn').innerText = "DEPLOY_TO_CLOUD";
            showView('editor');
        };

        window.startEdit = (id) => {
            const g = cachedGames.find(x => x.id === id);
            document.getElementById('edit-id').value = g.id;
            document.getElementById('g-emoji').value = g.emoji;
            document.getElementById('g-title').value = g.title;
            document.getElementById('g-html').value = g.html;
            document.getElementById('editor-title').innerText = "SOURCE_UPDATE";
            document.getElementById('submit-btn').innerText = "UPDATE_DEPLOYMENT";
            showView('editor');
        };

        window.askDelete = (id) => {
            openUIModal("WARNING", "Permanent deletion requested. Proceed?", "DELETE", () => executeDelete(id), true);
        };

        async function executeDelete(id) {
            try {
                await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'games', id));
                openUIModal("SUCCESS", "Object erased from cloud.", "OK", closeUIModal, false);
            } catch (e) { openUIModal("FAIL", "Protocol protection active.", "OK", closeUIModal, true); }
        }

        document.getElementById('editor-form').onsubmit = async (e) => {
            e.preventDefault();
            if (auth.currentUser.email !== ADMIN_EMAIL) return;

            const loader = document.getElementById('loader-overlay');
            const editId = document.getElementById('edit-id').value;
            loader.classList.remove('hidden');

            try {
                const gameId = editId || 'g_' + Date.now();
                const data = {
                    title: document.getElementById('g-title').value,
                    emoji: document.getElementById('g-emoji').value,
                    html: document.getElementById('g-html').value,
                    authorId: auth.currentUser.uid,
                    authorEmail: auth.currentUser.email,
                    updatedAt: serverTimestamp()
                };
                if(!editId) data.createdAt = serverTimestamp();

                await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'games', gameId), data, { merge: true });
                setTimeout(() => { loader.classList.add('hidden'); showView('home'); }, 500);
            } catch (err) {
                loader.classList.add('hidden');
                openUIModal("ERROR", err.message, "RETRY", closeUIModal, true);
            }
        };
    </script>
</body>
</html>
