<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAI-ROBLOX Classic Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --rbx-blue: #00a2ff; --rbx-bg: #0e0e11; --rbx-card: #1c1d22; --admin-gold: #ffb800; --danger: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--rbx-bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden; }

        /* УВЕДОМЛЕНИЯ */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100000; width: 90%; max-width: 400px; }
        .toast { background: #222; border-left: 4px solid var(--rbx-blue); padding: 15px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* ИНТЕРФЕЙС */
        header { height: 70px; background: #18191d; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #25262d; }
        .content { flex: 1; overflow-y: auto; padding: 20px; height: calc(100vh - 70px); }
        .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .game-item { background: var(--rbx-card); border-radius: 12px; overflow: hidden; border: 1px solid #25262d; transition: 0.2s; }
        .game-item:active { transform: scale(0.96); }
        .game-img { height: 110px; background: #25262d; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .game-name { padding: 10px; text-align: center; font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* BOTTOM SHEET */
        #preview-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; height: 60%; background: #18191d; z-index: 15000; border-top-left-radius: 25px; border-top-right-radius: 25px; transition: bottom 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); display: flex; flex-direction: column; }
        #preview-sheet.active { bottom: 0; }
        .sheet-banner { height: 150px; background: #25262d; display: flex; align-items: center; justify-content: center; font-size: 70px; border-top-left-radius: 25px; border-top-right-radius: 25px; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 14000; }

        /* АДМИНКА */
        #admin-panel { display: none; position: fixed; inset: 0; background: #0b0b0d; z-index: 20000; padding: 20px; overflow-y: auto; }
        .adm-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #1c1d22; border: 1px solid #333; color: #fff; border-radius: 8px; font-size: 14px; }
        .btn-main { width: 100%; padding: 18px; background: var(--rbx-blue); border: none; color: #fff; font-weight: 900; border-radius: 12px; }
        
        #player-layer { display: none; position: fixed; inset: 0; background: #000; z-index: 30000; }
        iframe { width: 100%; height: 100%; border: none; }
        .exit-btn { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px; z-index: 30001; border: none; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="main-hub">
        <header>
            <div style="font-weight:900; font-size:20px;">ROBLOX <span style="color:var(--rbx-blue)">CLOUD</span></div>
            <div id="admin-trigger" style="display:none; color:var(--admin-gold); font-size:11px; font-weight:900; border:1px solid var(--admin-gold); padding:5px 10px; border-radius:5px;" onclick="openAdmin()">STUDIO</div>
        </header>
        <div class="content">
            <div id="games-list" class="games-grid"></div>
        </div>
    </div>

    <div id="overlay" onclick="closePreview()"></div>

    <div id="preview-sheet">
        <div id="p-banner" class="sheet-banner">
            <span id="p-emoji"></span>
            <div style="position:absolute; top:15px; right:15px;" onclick="closePreview()">✕</div>
        </div>
        <div style="padding:20px; text-align:center; flex:1;">
            <div id="p-title" style="font-size:22px; font-weight:900;"></div>
            <div id="p-desc" style="color:#aaa; margin-top:8px; font-size:14px;"></div>
        </div>
        <div style="padding:20px;"><button id="p-play-btn" class="btn-main">ИГРАТЬ</button></div>
    </div>

    <div id="admin-panel">
        <h2 style="color:var(--admin-gold)" id="adm-header">CREATOR STUDIO</h2>
        <input type="text" id="g-name" class="adm-input" placeholder="Название игры">
        <input type="text" id="g-emoji" class="adm-input" placeholder="Emoji (например ⚡)">
        <textarea id="g-desc" class="adm-input" style="height:70px;" placeholder="Описание игры..."></textarea>
        <textarea id="g-code" class="adm-input" style="height:150px; font-family:monospace;" placeholder="Код (HTML/JS)..."></textarea>
        
        <button id="publish-btn" class="btn-main" onclick="publishGame()">ОПУБЛИКОВАТЬ</button>
        
        <div id="manage-list" style="margin-top:25px;"></div>
        <button onclick="closeAdmin()" style="width:100%; margin-top:20px; padding:12px; background:#333; color:#fff; border:none; border-radius:8px;">ЗАКРЫТЬ</button>
    </div>

    <div id="player-layer">
        <button class="exit-btn" onclick="stopGame()">✕ ВЫЙТИ</button>
        <iframe id="game-frame"></iframe>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCFJQ4OKKStxVW7gUj1lS4KHwxGc1_QIwg",
            authDomain: "mymobilegame-b5e68.firebaseapp.com",
            projectId: "mymobilegame-b5e68",
            storageBucket: "mymobilegame-b5e68.appspot.com",
            appId: "1:137334852741:web:7f1be97afce766c011edec"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let library = [], editingID = null;

        window.onload = async () => {
            notify("Облако готово ✨");
            await loadGames();
            document.getElementById('admin-trigger').style.display = 'block'; 
        };

        function notify(text) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = text;
            container.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        async function loadGames() {
            const snap = await db.collection('shared_games').get();
            library = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            render();
        }

        function render() {
            document.getElementById('games-list').innerHTML = library.map((g, i) => `
                <div class="game-item" onclick="openPreview(${i})">
                    <div class="game-img">${g.emoji || '🎮'}</div>
                    <div class="game-name">${g.name}</div>
                </div>`).join('');
            
            document.getElementById('manage-list').innerHTML = '<h3 style="font-size:14px;">Управление:</h3>' + library.map(g => `
                <div style="display:flex; justify-content:space-between; align-items:center; background:#1c1d22; padding:10px; margin-top:8px; border-radius:10px; border:1px solid #333;">
                    <span style="font-size:12px;">${g.name}</span>
                    <div>
                        <button onclick="editMode('${g.id}')" style="background:var(--admin-gold); color:#000; border:none; padding:6px 10px; border-radius:5px; font-size:10px; font-weight:bold; margin-right:5px;">EDIT</button>
                        <button onclick="deleteGame('${g.id}')" style="background:var(--danger); color:#fff; border:none; padding:6px 10px; border-radius:5px; font-size:10px;">DEL</button>
                    </div>
                </div>`).join('');
        }

        async function publishGame() {
            const n = document.getElementById('g-name').value, 
                  e = document.getElementById('g-emoji').value, 
                  d = document.getElementById('g-desc').value, 
                  c = document.getElementById('g-code').value;
            
            if(!n || !c) return notify("Заполни имя и код!");

            const data = { name: n, emoji: e, desc: d, code: c };
            
            if(editingID) {
                await db.collection('shared_games').doc(editingID).update(data);
                notify("✅ Обновлено!");
            } else {
                await db.collection('shared_games').add(data);
                notify("🚀 Опубликовано!");
            }
            reset(); await loadGames(); closeAdmin();
        }

        async function deleteGame(id) {
            if(confirm("Удалить эту игру из облака?")) {
                await db.collection('shared_games').doc(id).delete();
                notify("🗑️ Удалено");
                await loadGames();
            }
        }

        function editMode(id) {
            const g = library.find(x => x.id === id);
            editingID = id;
            document.getElementById('g-name').value = g.name;
            document.getElementById('g-emoji').value = g.emoji;
            document.getElementById('g-desc').value = g.desc;
            document.getElementById('g-code').value = g.code;
            document.getElementById('adm-header').innerText = "РЕДАКТИРОВАНИЕ";
            document.getElementById('publish-btn').innerText = "СОХРАНИТЬ";
            document.getElementById('admin-panel').scrollTo(0,0);
        }

        function openPreview(i) {
            const g = library[i];
            document.getElementById('p-emoji').innerText = g.emoji || '🎮';
            document.getElementById('p-title').innerText = g.name;
            document.getElementById('p-desc').innerText = g.desc || "Описание не добавлено.";
            document.getElementById('p-play-btn').onclick = () => run(i);
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('preview-sheet').classList.add('active');
        }

        function reset() { 
            editingID = null; 
            document.getElementById('g-name').value = ""; 
            document.getElementById('g-code').value = "";
            document.getElementById('adm-header').innerText = "CREATOR STUDIO";
            document.getElementById('publish-btn').innerText = "ОПУБЛИКОВАТЬ"; 
        }

        function closePreview() { document.getElementById('overlay').style.display = 'none'; document.getElementById('preview-sheet').classList.remove('active'); }
        function run(i) { closePreview(); document.getElementById('game-frame').srcdoc = library[i].code; document.getElementById('player-layer').style.display = 'block'; }
        function stopGame() { document.getElementById('player-layer').style.display = 'none'; document.getElementById('game-frame').srcdoc = ''; }
        function openAdmin() { document.getElementById('admin-panel').style.display = 'block'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; reset(); }
    </script>
</body>
</html>
